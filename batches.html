<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Batches — rarestudy</title>
    <link rel="icon" type="image/png" href="https://rarestudy.in/static/site_logo.png">
    <link rel="manifest" id="manifest-placeholder">
    <meta name="application-name" content="rarestudy">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="rarestudy">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://rarestudy.in/static/site_logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            height: 100%;
            font-family: Inter, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1400;
            border-bottom: 1px solid rgba(99, 102, 241, 0.25);
            padding: 0 16px;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #6366f1 50%, transparent 100%);
        }

        .site-brand {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
            font-size: 18px;
            color: #f1f5f9;
            letter-spacing: 0.3px;
        }

        .site-brand .brand-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            flex-shrink: 0;
        }

        .site-brand .brand-name {
            color: #f1f5f9;
        }

        .countdown-timer {
            display: none;
            align-items: center;
            gap: 5px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 700;
            color: #f87171;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0;
        }

        .countdown-timer.show {
            display: flex;
        }

        .search-section {
            position: fixed;
            top: 50px; left: 0; right: 0;
            z-index: 1350;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            padding: 15px 20px;
        }

        .search-container {
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 12px 50px 12px 20px;
            border: 2px solid #334155;
            border-left: 4px solid #6366f1;
            border-radius: 25px;
            font-size: 16px;
            background: #1e293b;
            color: #e2e8f0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-box::placeholder {
            color: #64748b;
        }

        .search-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: #6366f1;
            border: none;
            border-radius: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 16px;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: #1e293b;
            border: 2px solid #334155;
            border-top: none;
            border-radius: 0 0 15px 15px;
            max-height: 420px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .autocomplete-dropdown.show {
            display: block;
        }

        .autocomplete-item {
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .autocomplete-item:hover,
        .autocomplete-item.highlighted {
            background: rgba(99, 102, 241, 0.15);
            border-left: 4px solid #6366f1;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-thumb-wrap {
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            line-height: 0;
        }

        .autocomplete-thumb {
            height: 56px;
            width: auto;
            display: block;
            border-radius: 8px;
        }

        .autocomplete-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }

        .autocomplete-name {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            white-space: normal;
            word-break: break-word;
            line-height: 1.4;
        }

        .autocomplete-meta {
            color: #64748b;
            font-size: 12px;
            white-space: normal;
            word-break: break-word;
            line-height: 1.4;
        }

        .autocomplete-highlight {
            background: rgba(99, 102, 241, 0.3);
            color: #818cf8;
            font-weight: 700;
            border-radius: 2px;
        }

        .tab-navigation {
            position: fixed;
            top: 120px; left: 0; right: 0;
            z-index: 1300;
            padding: 0 20px;
        }

        .tab-nav {
            display: flex;
            gap: 15px;
            height: 50px;
            background: #1e293b;
            border-radius: 15px;
            border: 1px solid #334155;
        }

        .tab-btn {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-btn:first-child {
            border-radius: 15px 0 0 15px;
        }

        .tab-btn:last-child {
            border-radius: 0 15px 15px 0;
        }

        .tab-btn.active {
            color: white;
            background: #6366f1;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(99, 102, 241, 0.15);
            color: #6366f1;
        }

        .content {
            position: absolute;
            top: 190px; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            padding: 25px;
        }

        .batches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .batch {
            background: #1e293b;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid #334155;
            border-left: 5px solid #6366f1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .batch.mahapack {
            border-left-color: #f59e0b;
        }

        .batch:hover {
            transform: translateY(-8px);
        }

        .mahapack-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #f59e0b;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            width: fit-content;
        }

        .batch-name {
            font-size: 18px;
            font-weight: 800;
            color: #e2e8f0;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .batch-thumbnail {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .batch-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .favorite-btn {
            position: absolute;
            top: 15px; right: 15px;
            width: 36px; height: 36px;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid #334155;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            z-index: 10;
        }

        .favorite-btn:hover {
            background: #334155;
            transform: scale(1.15);
        }

        .favorite-btn.favorited {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .batch-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .batch-language::before { content: "🗣️ "; }
        .batch-byname::before   { content: "👨‍🎓 "; }

        .batch-language,
        .batch-byname {
            font-size: 13px;
            color: #94a3b8;
        }

        .batch-dates {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #94a3b8;
        }

        .date-item::before { content: "🗓️ "; }

        .batch-price {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .batch-price-original {
            text-decoration: line-through;
            color: #64748b;
        }

        .batch-price-free {
            color: #22c55e;
            font-weight: 700;
        }

        .explore-btn {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: auto;
        }

        .batch.mahapack .explore-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .explore-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .skeleton-card {
            background: #1e293b;
            border-radius: 18px;
            padding: 20px;
            border: 1px solid #334155;
            border-left: 5px solid #6366f1;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-title {
            height: 24px;
            background: #334155;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .skeleton-image {
            height: 220px;
            background: #334155;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .skeleton-text {
            height: 16px;
            background: #334155;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .skeleton-text.short { width: 60%; }

        .skeleton-button {
            height: 45px;
            background: #334155;
            border-radius: 12px;
            margin-top: 10px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: #1e293b;
            border-radius: 20px;
            margin: 20px auto;
            max-width: 500px;
            border: 1px solid #334155;
        }

        .empty-icon  { font-size: 64px; margin-bottom: 20px; opacity: 0.8; }
        .empty-title { font-size: 24px; font-weight: 700; margin-bottom: 15px; color: #e2e8f0; }
        .empty-desc  { font-size: 16px; color: #94a3b8; line-height: 1.5; }

        .error-box {
            text-align: center;
            padding: 20px;
            background: #dc2626;
            border-radius: 12px;
            margin: 0 auto 25px auto;
            max-width: 500px;
            border: 1px solid #b91c1c;
            color: white;
            display: none;
        }

        .error-box.show  { display: block; }
        .error-box-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .error-box-desc  { font-size: 14px; color: #fecaca; line-height: 1.4; }

        .mahapack-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 2000;
            flex-direction: column;
            overflow: hidden;
        }

        .mahapack-overlay.open {
            display: flex;
        }

        .mahapack-header {
            position: relative;
            height: 52px;
            background: rgba(15, 23, 42, 0.97);
            border-bottom: 1px solid rgba(30, 41, 59, 0.6);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
            flex-shrink: 0;
            z-index: 10;
        }

        .mahapack-header::after {
            content: "";
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.5), transparent);
        }

        .mahapack-back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        .mahapack-back-btn:active { transform: scale(0.9); }
